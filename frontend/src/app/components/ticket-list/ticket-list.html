<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-list-task"></i> Gestão de Incidentes</h2>
    
    <button class="btn btn-primary" routerLink="/tickets/novo">
      <i class="bi bi-plus-circle"></i> Novo Chamado
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Título</th>
            <th>Descrição</th>
            <th>Prioridade</th>
            <th>Status</th>
            <th>Data</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let ticket of tickets">
            <td><strong>{{ ticket.title }}</strong></td>
            <td class="text-truncate" style="max-width: 200px;">{{ ticket.description }}</td>
            <td>
              <span [class]="getPriorityClass(ticket.priority)">
                {{ ticket.priority }}
              </span>
            </td>
            <td>
              <span class="badge rounded-pill border text-dark bg-light">
                {{ ticket.status }}
              </span>
            </td>
            <td>{{ ticket.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-secondary me-2" [routerLink]="['/tickets/editar', ticket.id]">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="tickets.length === 0">
            <td colspan="6" class="text-center py-4 text-muted">
              Nenhum incidente encontrado no sistema.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
